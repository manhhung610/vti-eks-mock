name: terraform

on:
  pull_request:
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to plan/apply"
        required: true
        type: choice
        options:
          - dev
          - prod
      apply:
        description: "Apply the Terraform plan"
        required: true
        type: boolean
        default: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: REPLACE_WITH_GITHUB_ACTIONS_AWS_ROLE_ARN
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -backend-config=backend-${{ inputs.environment || 'dev' }}.hcl

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -var-file=${{ inputs.environment || 'dev' }}.terraform.tfvars -out=tfplan

      - name: Terraform apply
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply == true }}
        run: terraform apply -auto-approve tfplan

