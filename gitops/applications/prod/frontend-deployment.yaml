apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mock-app
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: mock-eks
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: mock-eks
    spec:
      containers:
        - name: frontend
          image: public.ecr.aws/nginx/nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http

