apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hungnm-de000155-dev-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/manhhung610/vti-eks-mock.git
    targetRevision: main
    path: gitops/envs/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
